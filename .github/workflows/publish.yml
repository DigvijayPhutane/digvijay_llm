[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "digvijay_llm"
version = "0.1.0"
description = "Run 70B LLMs on low-RAM machines by streaming weights from disk"
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.9"
dependencies = ["psutil>=5.9.0"]

[project.optional-dependencies]
gguf = ["llama-cpp-python>=0.2.0"]
hf = ["torch>=2.0.0", "transformers>=4.38.0", "accelerate>=0.27.0", "safetensors>=0.4.0"]
all = ["llama-cpp-python>=0.2.0", "torch>=2.0.0", "transformers>=4.38.0", "accelerate>=0.27.0", "safetensors>=0.4.0"]
